<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Cameras</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        :root {
            --bg:#0f172a;
            --fg:#e2e8f0;
            --card:#111827;
            --muted:#94a3b8;
            --accent:#22d3ee;
            --ok:#22c55e;
            --warn:#f59e0b;
            --bad:#ef4444;
        }
        * { box-sizing:border-box; }
        body {
            margin:0;
            font-family: ui-sans-serif, system-ui;
            background:var(--bg); color:var(--fg);
        }
        header {
            padding:16px 20px;
            border-bottom:1px solid #1f2937;
            display:flex; justify-content:space-between;
        }
        h1 { font-size:20px; margin:0; }
        table {
            width:100%;
            table-layout: fixed;
            border-collapse:collapse;
        }
        th, td {
            padding:8px;
            border-bottom:1px solid #1f2937;
            text-align:left;
        }
        th {
            color:var(--muted);
            font-size:12px;
        }
        .container {
            padding:16px;
        }
        .card {
            background:var(--card);
            border:1px solid #1f2937;
            border-radius:14px;
            padding:14px;
        }
        .section-title {
            font-size:14px;
            color:var(--muted);
            margin-bottom:10px;
        }
        .main-nav {
            background: var(--bg); border-bottom: 1px solid #1f2937;
            padding: 0 32px; display: flex; align-items: stretch;
            position: sticky; top: 64px; z-index: 99; height: 49px;
        }
        .nav-tab {
            padding: 0 20px; height: 49px; background: none; border: none;
            color: var(--muted); font-size: 0.875rem; font-weight: 500;
            cursor: pointer; position: relative; text-decoration: none;
            display: inline-flex; align-items: center; transition: color 0.2s;
            white-space: nowrap;
        }
        .nav-tab:hover { color: var(--accent); }
        .nav-tab.active { color: var(--accent); }
        .nav-tab.active::after {
            content: ''; position: absolute;
            bottom: 0; left: 0; right: 0; height: 2px;
            background: var(--accent); border-radius: 2px 2px 0 0;
        }
        .event {
            border:1px solid #1f2937;
            border-radius:12px;
            padding:12px;
            margin-bottom:12px;
        }
        .event-header {
            display:flex;
            justify-content:space-between;
            margin-bottom:8px;
        }
        .badge {
            font-size:12px;
            padding:2px 8px;
            border-radius:10px;
            border:1px solid #334155;
        }
        .threat-0 { color:var(--ok); }
        .threat-1 { color:var(--warn); }
        .threat-2 { color:var(--bad); }

        .object {
            padding:8px;
            border-left:3px solid #334155;
            margin-top:8px;
        }
        .lp {
            font-family: monospace;
            letter-spacing:2px;
            color:#fcd34d;
            font-weight:600;
        }
        .muted { color:var(--muted); font-size:12px; }
        img {
            max-width:100%;
            border-radius:8px;
            margin-top:8px;
        }
        .filters {
            display:flex;
            gap:10px;
            margin-bottom:12px;
        }
        .filters input, .filters select {
            background:#020617;
            border:1px solid #334155;
            color:var(--fg);
            padding:6px;
            border-radius:6px;
        }
    </style>
</head>
<header>
    <h1>Surveillance Camera</h1>
    <nav class="main-nav">
        <a class="nav-tab" href="/">Dashboard</a>
        <a class="nav-tab" href="/events">Events</a>
        <a class="nav-tab active" href="/cameras">Cameras</a>
        <a class="nav-tab" href="/analytics">Analytics</a>
    </nav>
</header>

<div class="container">
    <div class="filters">
        <select id="statusFilter">
            <option value="">All Cameras</option>
            <option value="online">Online</option>
            <option value="stale">Stale</option>
            <option value="offline">Offline</option>
        </select>
    </div>

    <div class="card">
        <h3 class="section-title">Camera Health</h3>
        <table id="telemetryTable">
            <thead>
            <tr>
                <th>Camera ID</th>
                <th>Status</th>
                <th>Workers</th>
                <th>LPR Queue</th>
                <th>Active Tracks</th>
                <th>Last Seen</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="empty-telemetry" style="display:none;">No cameras reporting.</div>
    </div>

    <br>

    <div class="card">
        <h3 class="section-title">Live Tracks</h3>
        <table id="liveTable">
            <thead>
            <tr>
                <th>Track ID</th>
                <th>Camera</th>
                <th>Label</th>
                <th>Confidence</th>
                <th>Plate</th>
                <th>Last Seen</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="empty-live" style="display:none;">No active tracks.</div>
    </div>
</div>

<script>
    let allTelemetry = [];
    let allLive = []

    function cameraStatus(lastSeenISO) {
        const ageMs = Date.now() - new Date(lastSeenISO).getTime();
        if (ageMs < 5_000)  return "online";
        if (ageMs < 15_000) return "stale";
        return "offline";
    }

    function relativeTime(isoString) {
        const secs = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
        if (secs < 2)  return "just now";
        if (secs < 60) return `${secs}s ago`;
        return `${Math.floor(secs / 60)}m ago`;
    }

    async function fetchTelemetry() {
        try {
            const r = await fetch("/api/ingest/telemetry");
            if (!r.ok) throw new Error(r.status);
            allTelemetry = await r.json();     // list of camera snapshots
            renderTelemetry();
        } catch (e) {
            console.error("[telemetry]", e);
        }
    }

    async function fetchLive() {
        try {
            const r = await fetch("/api/ingest/live");
            if (!r.ok) throw new Error(r.status);
            allLive = await r.json();           // list of track snapshots
            renderLive();
        } catch (e) {
            console.error("[live]", e);
        }
    }

    function renderTelemetry() {
        const filter = document.getElementById("statusFilter").value;
        const tbody  = document.querySelector("#telemetryTable tbody");
        tbody.innerHTML = "";

        const rows = allTelemetry.filter(cam => {
            const s = cameraStatus(cam.last_seen);
            return !filter || s === filter;
        });

        document.getElementById("empty-telemetry").style.display =
            rows.length === 0 ? "block" : "none";

        for (const cam of rows) {
            const status = cameraStatus(cam.last_seen);
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${cam.camera_id}</td>
                <td><span class="badge status-${status}">${status}</span></td>
                <td>${cam.workers_active}</td>
                <td>${cam.lpr_queue_size}</td>
                <td>${cam.active_tracks}</td>
                <td class="muted">${relativeTime(cam.last_seen)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    function renderLive() {
        const filter = document.getElementById("statusFilter").value;
        const tbody  = document.querySelector("#liveTable tbody");
        tbody.innerHTML = "";

        // Optionally cross-filter live tracks by the same camera status filter
        // (skip if you want live tracks always visible regardless of camera filter)
        const rows = allLive;

        document.getElementById("empty-live").style.display =
            rows.length === 0 ? "block" : "none";

        for (const track of rows) {
            const conf = (track.confidence * 100).toFixed(0);
            const plate = track.license_plate
                ? `<span class="lp">${track.license_plate}</span>`
                : `<span class="muted">—</span>`;
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${track.track_id}</td>
                <td>${track.camera_id}</td>
                <td>${track.label}</td>
                <td>${conf}%</td>
                <td>${plate}</td>
                <td class="muted">${relativeTime(track.last_seen)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    document.getElementById("statusFilter").addEventListener("change", () => {
        renderTelemetry();  // re-render with new filter, no re-fetch needed
    });

    fetchTelemetry();
    fetchLive();
    setInterval(fetchTelemetry, 3000);
    setInterval(fetchLive,      1500);
</script>

</html>
