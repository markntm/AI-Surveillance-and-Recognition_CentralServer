<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Events</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        :root {
            --bg:#0f172a;
            --fg:#e2e8f0;
            --card:#111827;
            --muted:#94a3b8;
            --accent:#22d3ee;
            --ok:#22c55e;
            --warn:#f59e0b;
            --bad:#ef4444;
        }
        * { box-sizing:border-box; }
        body {
            margin:0;
            font-family: ui-sans-serif, system-ui;
            background:var(--bg); color:var(--fg);
        }
        header {
            padding:16px 20px;
            border-bottom:1px solid #1f2937;
            display:flex; justify-content:space-between;
        }
        h1 { font-size:20px; margin:0; }
        table {
            width:100%;
            table-layout: fixed;
            border-collapse:collapse;
        }
        th, td {
            padding:8px;
            border-bottom:1px solid #1f2937;
            text-align:left;
        }
        th {
            color:var(--muted);
            font-size:12px;
        }
        .container {
            padding:16px;
        }
        .card {
            background:var(--card);
            border:1px solid #1f2937;
            border-radius:14px;
            padding:14px;
        }
        .section-title {
            font-size:14px;
            color:var(--muted);
            margin-bottom:10px;
        }
        .main-nav {
            background: var(--bg); border-bottom: 1px solid #1f2937;
            padding: 0 32px; display: flex; align-items: stretch;
            position: sticky; top: 64px; z-index: 99; height: 49px;
        }
        .nav-tab {
            padding: 0 20px; height: 49px; background: none; border: none;
            color: var(--muted); font-size: 0.875rem; font-weight: 500;
            cursor: pointer; position: relative; text-decoration: none;
            display: inline-flex; align-items: center; transition: color 0.2s;
            white-space: nowrap;
        }
        .nav-tab:hover { color: var(--accent); }
        .nav-tab.active { color: var(--accent); }
        .nav-tab.active::after {
            content: ''; position: absolute;
            bottom: 0; left: 0; right: 0; height: 2px;
            background: var(--accent); border-radius: 2px 2px 0 0;
        }
        .event {
            border:1px solid #1f2937;
            border-radius:12px;
            padding:12px;
            margin-bottom:12px;
        }
        .event-header {
            display:flex;
            justify-content:space-between;
            margin-bottom:8px;
        }
        .badge {
            font-size:12px;
            padding:2px 8px;
            border-radius:10px;
            border:1px solid #334155;
        }
        .threat-0 { color:var(--ok); }
        .threat-1 { color:var(--warn); }
        .threat-2 { color:var(--bad); }

        .object {
            padding:8px;
            border-left:3px solid #334155;
            margin-top:8px;
        }
        .lp {
            font-family: monospace;
            letter-spacing:2px;
            color:#fcd34d;
            font-weight:600;
        }
        .muted { color:var(--muted); font-size:12px; }
        img {
            max-width:100%;
            border-radius:8px;
            margin-top:8px;
        }
        .filters {
            display:flex;
            gap:10px;
            margin-bottom:12px;
        }
        .filters input, .filters select {
            background:#020617;
            border:1px solid #334155;
            color:var(--fg);
            padding:6px;
            border-radius:6px;
        }
    </style>
</head>

<body>
<header>
    <h1>Surveillance Events</h1>
    <nav class="main-nav">
        <a class="nav-tab" href="/">Dashboard</a>
        <a class="nav-tab active" href="/events">Events</a>
        <a class="nav-tab" href="/cameras">Cameras</a>
        <a class="nav-tab" href="/analytics">Analytics</a>
    </nav>
</header>

<div class="container">
    <div class="filters">
        <select id="threatFilter">
            <option value="">All Threats</option>
            <option value="0">Low</option>
            <option value="1">Medium</option>
            <option value="2">High</option>
        </select>

        <select id="cameraFilter">
            <option value="">All Cameras</option>
            <option value="CAM_01">CAM 1</option>
            <option value="CAM_02">CAM 2</option>
            <option value="CAM_03">CAM 3</option>
        </select>

        <input type="date" id="dateFilter" name="dateFilter">

        <select id="hasLicensePlate">
            <option value="">All Events</option>
            <option value="hasLP">LP Detected</option>
        </select>
    </div>

    <div class="card">
        <div id="view-events">
            <h3 class="section-title">All Events</h3>
            <div id="events" class="view">
                <table id="eventsTable">
                    <thead>
                    <tr>
                        <th>Time</th>
                        <th>Camera</th>
                        <th>Threat</th>
                        <th>Objects</th>
                        <th>Plates</th>
                        <th>Image</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>


<script>

    async function fetchEvents() {
        try {
            const r = await fetch("/api/events?");
            const data = await r.json();
            renderEvents(data.events);
        } catch (e) {
            console.error(e);
        }
    }

    function openEvent(eventId) {
        alert("Event " + eventId + " clicked");
    }

    document.getElementById('dateFilter').valueAsDate = new Date();
    document.getElementById('dateFilter').max = new Date().toISOString().split('T')[0];

    function formatTime(timestamp) {
        const options = { timeZone: 'Pacific/Honolulu' };

        const date = new Date(timestamp).toLocaleDateString('en-US', options);
        const time = new Date(timestamp).toLocaleTimeString('en-US', options);
        return `${date}<br>${time}`;
    }

    function renderEvents(events) {
        const tbody = document.querySelector("#eventsTable tbody");
        tbody.innerHTML = "";

        for (const ev of events) {
            const tr = document.createElement("tr");

            const objects = ev.objects.map(o => o.object_type).join(", ");
            const vehicle = ev.objects.find(o => o.vehicle)?.vehicle?.license_plate || "None Detected";
            const image = "None Taken"

            tr.innerHTML = `
            <td>${formatTime(ev.timestamp)}</td>
            <td>${ev.camera_id}</td>
            <td class="threat-${ev.threat_score}">${ev.threat_score}</td>
            <td>${objects}</td>
            <td class="lp">${vehicle}</td>
            <td>${image}</td>
        `;

            tbody.appendChild(tr);
        }
    }

    fetchEvents();
    setInterval(fetchEvents, 3000);
</script>
</body>
</html>
